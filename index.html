<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuelWise - ඉන්ධන පිරිවැය ගණකය</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f5f5f0; }
        .result-card { transition: all 0.3s ease; }
        .tracking-active { background-color: #fef2f2; border-color: #fee2e2; }
    </style>
</head>
<body class="text-[#1a1a1a] pb-20">
    <!-- Silent Audio for Background Persistence -->
    <audio id="bgAudio" loop src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA="></audio>

    <div id="app" class="max-w-md mx-auto px-6 py-12">
        <!-- Header -->
        <header class="mb-10 text-center">
            <div class="inline-flex items-center justify-center p-3 bg-[#5A5A40] text-white rounded-2xl mb-4 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 22L15 22"/><path d="M4 9L4 18"/><path d="M14 22L14 9"/><path d="M4 9C4 6.23858 6.23858 4 9 4C11.7614 4 14 6.23858 14 9"/><path d="M9 12L9 12"/><path d="M18 5V11"/><path d="M21 8L15 8"/></svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight mb-2">FuelWise</h1>
            <p class="text-[#5A5A40] font-medium">ඉන්ධන පිරිවැය ගණකය</p>
        </header>

        <!-- Live Tracking Banner -->
        <div id="trackingBanner" class="mb-6 p-4 rounded-3xl flex items-center justify-between bg-[#5A5A40]/5 border border-[#5A5A40]/10 transition-all">
            <div class="flex items-center gap-3">
                <div id="trackingIcon" class="p-2 rounded-xl bg-[#5A5A40] text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
                </div>
                <div>
                    <p class="text-xs font-bold text-[#5A5A40] uppercase tracking-wider">Live Tracking</p>
                    <p id="trackingStatus" class="text-sm font-medium">Live ගණනය ආරම්භ කරන්න</p>
                </div>
            </div>
            <button id="toggleBtn" onclick="toggleTracking()" class="bg-[#5A5A40] text-white px-4 py-2 rounded-2xl font-bold text-sm shadow-lg transition-all">ආරම්භ කරන්න</button>
        </div>

        <!-- Inputs -->
        <div class="bg-white rounded-[32px] p-8 shadow-xl mb-8 border border-black/5">
            <div class="space-y-6">
                <div>
                    <label id="distLabel" class="block text-xs font-bold uppercase tracking-wider text-[#5A5A40] mb-3">දිනකට ධාවනය වන දුර (කි.මී.)</label>
                    <div class="relative">
                        <input type="number" id="distance" value="20" oninput="calculate()" class="w-full bg-[#f5f5f0] border-none rounded-2xl px-5 py-4 text-lg font-semibold outline-none focus:ring-2 focus:ring-[#5A5A40]">
                        <span class="absolute right-5 top-1/2 -translate-y-1/2 text-sm font-bold text-[#5A5A40]/50">km</span>
                    </div>
                </div>
                <div id="effGroup">
                    <label class="block text-xs font-bold uppercase tracking-wider text-[#5A5A40] mb-3">ඉන්ධන කාර්යක්ෂමතාව (කි.මී./ලී.)</label>
                    <div class="relative">
                        <input type="number" id="efficiency" value="15" oninput="calculate()" class="w-full bg-[#f5f5f0] border-none rounded-2xl px-5 py-4 text-lg font-semibold outline-none focus:ring-2 focus:ring-[#5A5A40]">
                        <span class="absolute right-5 top-1/2 -translate-y-1/2 text-sm font-bold text-[#5A5A40]/50">km/L</span>
                    </div>
                </div>
                <div id="priceGroup">
                    <label class="block text-xs font-bold uppercase tracking-wider text-[#5A5A40] mb-3">ලීටරයක මිල (රු.)</label>
                    <div class="relative">
                        <input type="number" id="price" value="370" oninput="calculate()" class="w-full bg-[#f5f5f0] border-none rounded-2xl px-5 py-4 text-lg font-semibold outline-none focus:ring-2 focus:ring-[#5A5A40]">
                        <span class="absolute right-5 top-1/2 -translate-y-1/2 text-sm font-bold text-[#5A5A40]/50">Rs.</span>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="reset()" class="flex-1 py-3 text-sm font-bold text-[#5A5A40] hover:bg-[#5A5A40]/5 rounded-2xl transition-colors">Reset</button>
                    <button onclick="saveToHistory()" class="flex-[2] py-3 bg-[#5A5A40] text-white rounded-2xl font-bold shadow-lg">දත්ත සුරකින්න (Save)</button>
                </div>
            </div>
        </div>

        <!-- Results -->
        <div class="grid gap-4 mb-12">
            <div class="bg-white rounded-3xl p-6 flex items-center justify-between shadow-md border border-black/5">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-blue-50 text-blue-600 rounded-2xl font-bold">L</div>
                    <div><p class="text-xs font-bold text-gray-400 uppercase">දිනකට යන ඉන්ධන</p><p class="text-lg font-bold">Daily Fuel</p></div>
                </div>
                <p id="resFuel" class="text-2xl font-black text-blue-600">0.00</p>
            </div>
            <div class="bg-white rounded-3xl p-6 flex items-center justify-between shadow-md border border-black/5">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-green-50 text-green-600 rounded-2xl font-bold">Rs</div>
                    <div><p class="text-xs font-bold text-gray-400 uppercase">දිනකට යන පිරිවැය</p><p class="text-lg font-bold">Daily Cost</p></div>
                </div>
                <p id="resCost" class="text-2xl font-black text-green-600">0</p>
            </div>
        </div>

        <!-- History Section -->
        <div class="mt-12">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold">ඉතිහාසය (History)</h2>
                <button onclick="clearHistory()" class="text-xs font-bold text-red-500">Clear All</button>
            </div>
            <div id="historyList" class="space-y-4">
                <!-- History items will appear here -->
            </div>
        </div>
    </div>

    <script>
        let isTracking = false;
        let liveDistance = 0;
        let watchId = null;
        let lastPos = null;
        let history = JSON.parse(localStorage.getItem('fuelwise_history') || '[]');

        function calculate() {
            const d = isTracking ? liveDistance : parseFloat(document.getElementById('distance').value) || 0;
            const e = parseFloat(document.getElementById('efficiency').value) || 0;
            const p = parseFloat(document.getElementById('price').value) || 0;
            const fuel = e > 0 ? d / e : 0;
            const cost = fuel * p;
            document.getElementById('resFuel').innerText = fuel.toFixed(2);
            document.getElementById('resCost').innerText = Math.round(cost).toLocaleString();
            return { fuel, cost, distance: d };
        }

        function toggleTracking() {
            const btn = document.getElementById('toggleBtn');
            const status = document.getElementById('trackingStatus');
            const banner = document.getElementById('trackingBanner');
            const icon = document.getElementById('trackingIcon');
            const distInput = document.getElementById('distance');
            const audio = document.getElementById('bgAudio');

            if (isTracking) {
                navigator.geolocation.clearWatch(watchId);
                audio.pause();
                isTracking = false;
                btn.innerText = "ආරම්භ කරන්න";
                btn.className = "bg-[#5A5A40] text-white px-4 py-2 rounded-2xl font-bold text-sm shadow-lg";
                status.innerText = "Live ගණනය ආරම්භ කරන්න";
                banner.className = "mb-6 p-4 rounded-3xl flex items-center justify-between bg-[#5A5A40]/5 border border-[#5A5A40]/10";
                icon.className = "p-2 rounded-xl bg-[#5A5A40] text-white";
                distInput.readOnly = false;
                distInput.value = liveDistance.toFixed(2);
                distInput.classList.remove('text-red-600');
            } else {
                liveDistance = 0; lastPos = null; isTracking = true;
                audio.play().catch(() => {});
                btn.innerText = "නවත්වන්න";
                btn.className = "bg-red-500 text-white px-4 py-2 rounded-2xl font-bold text-sm shadow-lg";
                status.innerText = "දාවනය වෙමින් පවතී...";
                banner.className = "mb-6 p-4 rounded-3xl flex items-center justify-between bg-red-50 border border-red-100 shadow-lg shadow-red-100";
                icon.className = "p-2 rounded-xl bg-red-500 text-white animate-pulse";
                distInput.readOnly = true;
                distInput.classList.add('text-red-600');
                
                watchId = navigator.geolocation.watchPosition(pos => {
                    const { latitude, longitude, accuracy, timestamp } = pos.coords;
                    if (accuracy > 50) return;
                    if (lastPos) {
                        const d = getDist(lastPos.lat, lastPos.lon, latitude, longitude);
                        const timeDiff = (pos.timestamp - lastPos.time) / (1000 * 60 * 60);
                        const speed = timeDiff > 0 ? d / timeDiff : 0;
                        if (d > 0.01 && speed > 2 && speed < 200) {
                            liveDistance += d;
                            distInput.value = liveDistance.toFixed(2);
                            calculate();
                            lastPos = { lat: latitude, lon: longitude, time: pos.timestamp };
                        }
                    } else { lastPos = { lat: latitude, lon: longitude, time: pos.timestamp }; }
                }, null, { enableHighAccuracy: true });
            }
        }

        function getDist(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1) * Math.PI / 180;
            const dLon = (lon2-lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function saveToHistory() {
            const data = calculate();
            if (data.distance <= 0) return alert("කරුණාකර දුර ප්‍රමාණයක් ඇතුළත් කරන්න.");
            const entry = {
                id: Date.now(),
                date: new Date().toLocaleDateString('si-LK'),
                distance: data.distance,
                fuel: data.fuel,
                cost: data.cost
            };
            history.unshift(entry);
            localStorage.setItem('fuelwise_history', JSON.stringify(history));
            renderHistory();
            if (isTracking) toggleTracking();
            document.getElementById('distance').value = 0;
            calculate();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            if (history.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-400 py-10">තවමත් දත්ත සුරැකී නොමැත.</p>';
                return;
            }
            list.innerHTML = history.map(item => `
                <div class="bg-white rounded-3xl p-5 shadow-sm border border-black/5 flex items-center justify-between">
                    <div>
                        <p class="text-[10px] font-bold text-[#5A5A40]/60 uppercase">${item.date}</p>
                        <p class="text-sm font-bold">${item.distance.toFixed(1)} km | ${item.fuel.toFixed(2)} L</p>
                    </div>
                    <p class="text-lg font-black text-[#5A5A40]">Rs. ${Math.round(item.cost).toLocaleString()}</p>
                </div>
            `).join('');
        }

        function clearHistory() { if (confirm("මකා දැමීමට අවශ්‍යද?")) { history = []; localStorage.removeItem('fuelwise_history'); renderHistory(); } }
        function reset() { if (confirm("Reset කිරීමට අවශ්‍යද?")) { location.reload(); } }

        renderHistory();
    </script>
</body>
</html>
